// MODULE C: 碟形彈簧（Belleville）逆向計算
// ════════════════════════════════════════════════════════════════════════════
function BellevilleDiagram({ De, Di, t, h0, s = 0, nParallel = 1, nSeries = 1 }) {
  const W = 200, H = 220;
  // 比例縮放（最大寬度 160px）
  const scale = Math.min(150 / De, 60 / (h0 + t));
  const sDe = De * scale, sDi = Di * scale, st = t * scale, sh0 = h0 * scale;

  const cx = W / 2;
  const baseY = H - 40;
  const xOut1 = cx - sDe / 2, xOut2 = cx + sDe / 2;
  const xIn1  = cx - sDi / 2, xIn2  = cx + sDi / 2;

  // 截面（梯形側視）：外緣在底部、內緣抬高 h0
  // 上表面：從外邊（baseY - sh0/2）→ 內邊（baseY - sh0 - st）
  // 下表面：從外邊（baseY - sh0/2 + st 約略）但簡化處理
  // 直接畫兩側對稱的傾斜剖面：
  const upperLeft  = `${xOut1},${baseY} ${xIn1},${baseY - sh0} ${xIn1 + Math.max(2, st * 0.5)},${baseY - sh0 - st * 0.7} ${xOut1 + Math.max(2, st * 0.5)},${baseY - st * 0.7}`;
  const upperRight = `${xOut2},${baseY} ${xIn2},${baseY - sh0} ${xIn2 - Math.max(2, st * 0.5)},${baseY - sh0 - st * 0.7} ${xOut2 - Math.max(2, st * 0.5)},${baseY - st * 0.7}`;

  return (
    <svg width={W} height={H} style={{ display: "block", margin: "0 auto" }}>
      {/* 中心軸 */}
      <line x1={cx} y1={20} x2={cx} y2={H - 20}
            stroke={C.dim} strokeDasharray="3,3" strokeWidth={0.7} opacity={0.6} />

      {/* 碟形彈簧剖面（左右兩半） */}
      <polygon points={upperLeft}  fill={C.sky} stroke={C.ice} strokeWidth={1} opacity={0.85} />
      <polygon points={upperRight} fill={C.sky} stroke={C.ice} strokeWidth={1} opacity={0.85} />

      {/* De 標註 */}
      <line x1={xOut1} y1={baseY + 14} x2={xOut2} y2={baseY + 14}
            stroke={C.ice} strokeWidth={1} markerStart="url(#arrB)" markerEnd="url(#arrB)" />
      <text x={cx} y={baseY + 26} fill={C.ice} fontSize={9} fontFamily="Courier New" textAnchor="middle">
        De = {De} mm
      </text>

      {/* Di 標註 */}
      <line x1={xIn1} y1={baseY - sh0 - st - 8} x2={xIn2} y2={baseY - sh0 - st - 8}
            stroke={C.gold} strokeWidth={1} markerStart="url(#arrG)" markerEnd="url(#arrG)" />
      <text x={cx} y={baseY - sh0 - st - 14} fill={C.gold} fontSize={9} fontFamily="Courier New" textAnchor="middle">
        Di = {Di}
      </text>

      {/* h0 標註（右側） */}
      <line x1={xOut2 + 12} y1={baseY} x2={xOut2 + 12} y2={baseY - sh0}
            stroke={C.red} strokeWidth={1} markerStart="url(#arrR)" markerEnd="url(#arrR)" />
      <text x={xOut2 + 16} y={baseY - sh0 / 2 + 3} fill={C.red} fontSize={9} fontFamily="Courier New">
        h₀={h0}
      </text>

      {/* t 標註（左側） */}
      <text x={xOut1 - 6} y={baseY - 4} fill={C.green} fontSize={9} fontFamily="Courier New" textAnchor="end">
        t={t}
      </text>

      {/* 堆疊資訊 */}
      <text x={cx} y={16} fill={C.text} fontSize={10} fontFamily="Courier New" textAnchor="middle">
        {nParallel} 並聯 × {nSeries} 串聯
      </text>

      <defs>
        <marker id="arrB" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto">
          <path d="M0,0 L5,2.5 L0,5 Z" fill={C.ice} />
        </marker>
        <marker id="arrG" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto">
          <path d="M0,0 L5,2.5 L0,5 Z" fill={C.gold} />
        </marker>
        <marker id="arrR" markerWidth="5" markerHeight="5" refX="2.5" refY="2.5" orient="auto">
          <path d="M0,0 L5,2.5 L0,5 Z" fill={C.red} />
        </marker>
      </defs>
    </svg>
  );
}

function BellevilleForceChart({ points, workingS, workingF, h0 }) {
  const CustomDot = ({ cx, cy, payload }) => {
    if (Math.abs(payload.x - workingS) > h0 * 0.018) return null;
    return <circle cx={cx} cy={cy} r={6} fill={C.red} stroke="#fff" strokeWidth={2} />;
  };

  const TooltipContent = ({ active, payload }) => {
    if (!active || !payload?.length) return null;
    const { x, F } = payload[0].payload;
    return (
      <div style={{ background: C.navy, border: `1px solid ${C.border}`, padding: "8px 12px", borderRadius: 4, fontFamily: "Courier New", fontSize: 12 }}>
        <div style={{ color: C.dim }}>s = <span style={{ color: C.text }}>{x} mm</span></div>
        <div style={{ color: C.dim }}>F = <span style={{ color: C.ice }}>{F} N</span></div>
      </div>
    );
  };

  return (
    <ResponsiveContainer width="100%" height={210}>
      <LineChart data={points} margin={{ top: 8, right: 16, left: 0, bottom: 8 }}>
        <CartesianGrid strokeDasharray="3 3" stroke={C.border} />
        <XAxis dataKey="x" stroke={C.dim} tick={{ fill: C.dim, fontSize: 10, fontFamily: "Courier New" }}
               label={{ value: "壓縮量 s (mm)", position: "insideBottomRight", offset: -4, fill: C.dim, fontSize: 10 }} />
        <YAxis stroke={C.dim} tick={{ fill: C.dim, fontSize: 10, fontFamily: "Courier New" }}
               label={{ value: "F (N)", angle: -90, position: "insideLeft", fill: C.dim, fontSize: 10 }} />
        <Tooltip content={<TooltipContent />} />
        <ReferenceLine x={h0 * 0.75} stroke={C.amber} strokeDasharray="4 3" strokeWidth={1.2}
                       label={{ value: "0.75·h₀ (疲勞極限)", fill: C.amber, fontSize: 8, position: "top" }} />
        <ReferenceLine x={h0} stroke={C.red} strokeDasharray="4 3" strokeWidth={1.2}
                       label={{ value: "h₀ (壓平)", fill: C.red, fontSize: 8, position: "top" }} />
        <Line type="monotone" dataKey="F" stroke={C.sky} strokeWidth={2.5}
              dot={<CustomDot />} activeDot={{ r: 4, fill: C.ice }} />
      </LineChart>
    </ResponsiveContainer>
  );
}

function BellevilleModule() {
  const [De,  setDe]  = useState(25);
  const [Di,  setDi]  = useState(12.2);
  const [t,   setT]   = useState(1.5);
  const [h0,  setH0]  = useState(0.85);
  const [s,   setS]   = useState(0.6);
  const [mat, setMat] = useState("鉻釩鋼 SUP10");
  const [nP,  setNP]  = useState(1);
  const [nS,  setNS]  = useState(1);
  const [res, setRes] = useState(null);
  const [err, setErr] = useState("");

  const calc = () => {
    const errors = [];
    if (De <= 0)     errors.push("外徑 De 須 > 0");
    if (Di <= 0)     errors.push("內徑 Di 須 > 0");
    if (De / Di < 1.5 || De / Di > 5)
                     errors.push("De/Di 建議介於 1.5 ~ 5（典型 2.0）");
    if (t <= 0)      errors.push("厚度 t 須 > 0");
    if (h0 <= 0)     errors.push("錐高 h₀ 須 > 0");
    if (s < 0 || s > h0 * 1.05)
                     errors.push(`壓縮量 s 須介於 0 ~ ${h0} (h₀)`);
    if (nP < 1)      errors.push("並聯片數 ≥ 1");
    if (nS < 1)      errors.push("串聯組數 ≥ 1");
    if (errors.length) { setErr(errors.join("；")); setRes(null); return; }
    setErr("");

    const m  = MAT_G[mat];
    const E  = m.E, nu = m.nu;
    const r  = calcBelleville(De, Di, t, h0, s, E, nu);

    // 堆疊：並聯 → 力 × n_P，行程不變；串聯 → 行程 × n_S，力不變
    const F_stack     = r.F * nP;
    const s_stack     = s * nS;
    const k_stack     = (r.k_avg * nP) / nS;
    const L0_stack    = (h0 + t) * nS;  // 自由高

    // 簡化 SF 估算（使用平均強度 ~1500 MPa for spring steel）
    const Sut_typ     = m.coeff * Math.pow(t, m.exp);
    const sigma_allow = 0.85 * Sut_typ;   // Belleville 靜態許用
    const SF          = r.sigma_OM > 0 ? sigma_allow / r.sigma_OM : Infinity;

    setRes({
      ...r, De, Di, t, h0, s, mat, E, nu, nP, nS,
      F_stack, s_stack, k_stack, L0_stack,
      Sut_typ, sigma_allow, SF, m,
    });
  };

  const row = { display: "flex", flexWrap: "wrap", gap: 20 };

  return (
    <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
      <Card style={{ flex: "0 0 300px" }}>
        <BellevilleSchematic />
        <SectionTitle icon="🔶">碟形彈簧尺寸</SectionTitle>
        <div style={row}>
          <Input label="外徑 De" value={De} onChange={setDe} step={0.5} unit="mm" />
          <Input label="內徑 Di" value={Di} onChange={setDi} step={0.5} unit="mm" />
          <Input label="厚度 t"  value={t}  onChange={setT}  step={0.1} unit="mm" />
          <Input label="錐高 h₀" value={h0} onChange={setH0} step={0.1} unit="mm" />
        </div>

        <SectionTitle icon="🔧">工作條件</SectionTitle>
        <Select label="材料" value={mat} onChange={setMat} options={Object.keys(MAT_G)} />
        <Input label="壓縮量 s" value={s} onChange={setS} step={0.1} unit="mm" />

        <SectionTitle icon="🥞">疊合配置</SectionTitle>
        <div style={row}>
          <Input label="並聯片數 n_P" value={nP} onChange={v => setNP(Math.max(1, Math.round(v)))} step={1} min={1} unit="片" />
          <Input label="串聯組數 n_S" value={nS} onChange={v => setNS(Math.max(1, Math.round(v)))} step={1} min={1} unit="組" />
        </div>
        <div style={{ color: C.dim, fontSize: 10.5, lineHeight: 1.7, marginTop: 4 }}>
          並聯（同向）：力 × n_P，行程不變<br />
          串聯（交錯）：行程 × n_S，力不變
        </div>

        {err && <div style={{ color: C.red, fontFamily: "Courier New", fontSize: 11, margin: "10px 0" }}>⚠ {err}</div>}
        <div style={{ marginTop: 10 }}>
          <CalcButton onClick={calc}>▶ 計算 k & F</CalcButton>
        </div>
      </Card>

      {res && (
        <div style={{ flex: 1, minWidth: 340, display: "flex", flexDirection: "column", gap: 16 }}>
          {/* 警告 */}
          {res.h0_over_t > 1.414 && (
            <div style={{ padding: "10px 14px", background: C.amber + "22", border: `1px solid ${C.amber}`, borderRadius: 6, color: C.amber, fontFamily: "Courier New", fontSize: 11 }}>
              ⚠ h₀/t = {fmt2(res.h0_over_t)} &gt; 1.414，會出現負剛度區段（力先升後降），請確認設計意圖
            </div>
          )}
          {res.s_over_h0 > 0.75 && (
            <div style={{ padding: "10px 14px", background: C.amber + "22", border: `1px solid ${C.amber}`, borderRadius: 6, color: C.amber, fontFamily: "Courier New", fontSize: 11 }}>
              ⚠ s/h₀ = {fmt2(res.s_over_h0)} &gt; 0.75，超過疲勞使用建議；靜態用可至 s = h₀
            </div>
          )}

          {/* KPI */}
          <Card>
            <div style={{ display: "flex", gap: 28, flexWrap: "wrap" }}>
              <div>
                <Label>單片 F (s={res.s} mm)</Label>
                <div><Value big color={C.sky}>{fmt1(res.F)}</Value><span style={{ color: C.dim, marginLeft: 6 }}>N</span></div>
              </div>
              <div>
                <Label>單片 k 平均</Label>
                <div><Value color={C.green}>{fmt1(res.k_avg)}</Value><span style={{ color: C.dim, marginLeft: 6 }}>N/mm</span></div>
                <div style={{ color: C.dim, fontSize: 10 }}>初始 k₀ = {fmt1(res.k_init)}</div>
              </div>
              <div>
                <Label>堆疊後 F</Label>
                <div><Value big color={C.gold}>{fmt1(res.F_stack)}</Value><span style={{ color: C.dim, marginLeft: 6 }}>N</span></div>
                <div style={{ color: C.dim, fontSize: 10 }}>{fmt2(res.F_stack / 9.80665)} kgf</div>
              </div>
              <div>
                <Label>堆疊後 k</Label>
                <div><Value color={C.gold}>{fmt1(res.k_stack)}</Value><span style={{ color: C.dim, marginLeft: 6 }}>N/mm</span></div>
                <div style={{ color: C.dim, fontSize: 10 }}>行程 {fmt2(res.s_stack)} mm</div>
              </div>

// MODULE D: 波形彈簧（Wave Spring）逆向計算
// ════════════════════════════════════════════════════════════════════════════
function WaveDiagram({ OD, ID, N }) {
  const W = 200, H = 200;
  const cx = W / 2, cy = H / 2;
  const scale = Math.min(75 / OD, 75 / OD);
  const rOut = (OD / 2) * scale;
  const rIn  = (ID / 2) * scale;

  // 產生 N-wave 環狀波紋
  const waveAmp = (rOut - rIn) * 0.25;
  const outerPts = [], innerPts = [];
  const seg = 200;
  for (let i = 0; i <= seg; i++) {
    const ang = (i / seg) * 2 * Math.PI;
    const rO  = rOut + waveAmp * Math.sin(N * ang);
    const rI  = rIn  - waveAmp * Math.sin(N * ang);
    outerPts.push(`${cx + rO * Math.cos(ang)},${cy + rO * Math.sin(ang)}`);
    innerPts.push(`${cx + rI * Math.cos(ang)},${cy + rI * Math.sin(ang)}`);
  }
  innerPts.reverse();

  const pathD = "M " + outerPts.join(" L ") + " L " + innerPts.join(" L ") + " Z";

  return (
    <svg width={W} height={H} style={{ display: "block", margin: "0 auto" }}>
      {/* 外圈虛線（OD） */}
      <circle cx={cx} cy={cy} r={rOut + waveAmp} fill="none" stroke={C.dim} strokeDasharray="2,3" strokeWidth={0.7} opacity={0.5} />
      <circle cx={cx} cy={cy} r={rIn  - waveAmp} fill="none" stroke={C.dim} strokeDasharray="2,3" strokeWidth={0.7} opacity={0.5} />

      {/* 波紋環 */}
      <path d={pathD} fill={C.sky} stroke={C.ice} strokeWidth={1} opacity={0.85} fillRule="evenodd" />

      {/* 中心點 */}
      <circle cx={cx} cy={cy} r={2} fill={C.gold} />

      {/* 標註 */}
      <text x={cx} y={16} fill={C.ice} fontSize={10} fontFamily="Courier New" textAnchor="middle">
        {N} 波（單圈頂峰數）
      </text>
      <text x={cx} y={H - 24} fill={C.ice} fontSize={9} fontFamily="Courier New" textAnchor="middle">
        OD = {OD} mm
      </text>
      <text x={cx} y={H - 10} fill={C.gold} fontSize={9} fontFamily="Courier New" textAnchor="middle">
        ID = {ID} mm
      </text>
    </svg>
  );
}

// ════════════════════════════════════════════════════════════════════════════
// MODULE E: 矩形截面線圈彈簧（Rectangular Wire Coil Spring）
// ════════════════════════════════════════════════════════════════════════════

// β (剛度係數) 與 α (應力係數) — 依 a/b（長邊/短邊）查表
// 採 Wahl/Marin 線圈彈簧矩形截面標準表
const RECT_COEFFS = [
  // a/b ,  beta  ,  alpha
  [1.00, 0.1406, 0.208],
  [1.20, 0.166,  0.219],
  [1.50, 0.196,  0.231],
  [1.75, 0.214,  0.239],
  [2.00, 0.229,  0.246],
  [2.50, 0.249,  0.258],
  [3.00, 0.263,  0.267],
  [4.00, 0.281,  0.282],
  [6.00, 0.299,  0.298],
  [8.00, 0.307,  0.307],
  [10.0, 0.313,  0.313],
  [1000, 0.333,  0.333],   // 趨近薄板
];

function rectCoeffs(ratio) {
  const r = Math.max(1, ratio);
  for (let i = 0; i < RECT_COEFFS.length - 1; i++) {
    const [r1, b1, a1] = RECT_COEFFS[i];
    const [r2, b2, a2] = RECT_COEFFS[i + 1];
    if (r >= r1 && r <= r2) {
      const t = (r - r1) / (r2 - r1);
      return { beta: b1 + t * (b2 - b1), alpha: a1 + t * (a2 - a1) };
    }
  }
  return { beta: 0.333, alpha: 0.333 };
}

// 矩形截面壓縮彈簧 (Wahl 標準公式):
//   k = G · b · t³ · K1 / (D³ · Na)
//   t = 軸向邊長 (parallel to spring axis), b = 徑向邊長 (radial)
//   K1 (= β) 為剛度係數，依 b/t 比值查表
// 應力 (剪應力):
//   τ = Kw · F · D / (α · b · t²),  Kw 為 Wahl 修正係數
function calcRectSpring(a, b, D, Na, G, L0, Lw) {
  // 輸入 a = 軸向 (t)，b = 徑向；長/短邊以實際比例查表
  const t_axial  = a;     // 軸向邊長
  const b_radial = b;     // 徑向邊長
  const longSide  = Math.max(t_axial, b_radial);
  const shortSide = Math.min(t_axial, b_radial);
  const ratio = longSide / shortSide;        // ≥ 1
  const { beta, alpha } = rectCoeffs(ratio);

  // 彈簧指數 C 用徑向邊長定義（影響線圈彎曲半徑）
  const C     = D / b_radial;
  const delta = L0 - Lw;

  // Wahl 矩形截面剛度公式
  // k = G · b_radial · t_axial³ · β / (D³ · Na)
  const k = (G * b_radial * Math.pow(t_axial, 3) * beta) / (Math.pow(D, 3) * Na);
  const F = k * delta;

  // Wahl 應力修正
  const Kw = (4*C - 1)/(4*C - 4) + 0.615/C;
  // 剪應力: τ = Kw·F·D / (α · b_radial · t_axial²)
  const tau = F > 0
    ? (Kw * F * D) / (alpha * b_radial * t_axial * t_axial)
    : 0;

  // OD / ID 用徑向邊長計算
  const OD = D + b_radial;
  const ID = D - b_radial;
  return {
    a: t_axial, b: b_radial, ratio, beta, alpha,
    C, delta, k, F, Kw, tau, OD, ID,
    t_axial, b_radial, longSide, shortSide,
  };
}

function RectSpringDiagram({ a, b, D, Na, L0, OD, Ls }) {
  const W = 160, H = 280;
  const pad = 24;
  const drawH = H - pad * 2;
  const scaleY = drawH / (L0 * 1.15);
  const cx = W / 2;
  const springX = (OD / 2) * scaleY * 0.8;

  // Generate stacked rectangles for coils (side view)
  const pitch = (L0 - a) / Na;
  const coils = [];
  for (let i = 0; i < Na; i++) {
    const y = pad + drawH - i * pitch * scaleY - a * scaleY;
    coils.push(y);
  }

  return (
    <svg width={W} height={H} style={{ display: "block", margin: "0 auto" }}>
      {/* Coils as flat rectangles (side view) */}
      {coils.map((y, i) => (
        <rect key={i}
              x={cx - springX} y={y}
              width={springX * 2} height={Math.max(2, a * scaleY)}
              fill={C.sky} fillOpacity={0.7}
              stroke={C.ice} strokeWidth={0.5} />
      ))}

      {/* L0 marker */}
      <line x1={W - 8} y1={pad} x2={W - 8} y2={pad + drawH}
            stroke={C.red} strokeWidth={1.5} />
      <text x={W - 14} y={pad + drawH/2} fill={C.red} fontSize={9}
            fontFamily="Courier New" textAnchor="end">L₀</text>

      {/* OD label bottom */}
      <line x1={cx - springX} y1={H - 14} x2={cx + springX} y2={H - 14}
            stroke={C.ice} strokeWidth={1} markerStart="url(#arr2)" markerEnd="url(#arr2)" />
      <text x={cx} y={H - 4} fill={C.ice} fontSize={9} fontFamily="Courier New" textAnchor="middle">OD</text>

      {/* a × b legend */}
      <text x={6} y={pad - 6} fill={C.gold} fontSize={9} fontFamily="Courier New">
        a×b={a}×{b}
      </text>

      <defs>
        <marker id="arr2" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
          <path d="M0,0 L6,3 L0,6 Z" fill={C.ice} />
        </marker>
      </defs>
    </svg>
  );
}

function RectSpringModule() {
  const [a,   setA]   = useState(2.0);    // 軸向邊長（短邊）
  const [b,   setB]   = useState(3.0);    // 徑向邊長（長邊）
  const [D,   setDD]  = useState(15.0);
  const [Na,  setNa]  = useState(6.0);
  const [end, setEnd] = useState("閉合並磨平 (+2)");
  const [mat, setMat] = useState("碳鋼琴鋼線 SWC");
  const [L0,  setL0]  = useState(28.0);
  const [Lw,  setLw]  = useState(20.0);
  const [res, setRes] = useState(null);
  const [err, setErr] = useState("");

  const calc = () => {
    const errors = [];
    if (a <= 0 || b <= 0) errors.push("邊長 a, b 須 > 0");
    if (D <= Math.max(a, b)) errors.push("線圈中徑 Dm 須 > 截面邊長");
    if (Na < 1) errors.push("有效圈 Na 須 ≥ 1");
    if (Lw >= L0) errors.push("工作長須 < 自由長");
    if (errors.length) { setErr(errors.join("；")); setRes(null); return; }
    setErr("");

    const matData = MAT_G[mat];
    const Ne = END_COILS[end];
    const Nt = Na + Ne;
    const r  = calcRectSpring(a, b, D, Na, matData.G, L0, Lw);

    // 強度估算（取短邊估線徑等效）
    const dEq      = Math.sqrt(4 * a * b / Math.PI);   // 等效圓直徑
    const Sut      = matData.coeff * Math.pow(dEq, matData.exp);
    const tauAllow = 0.45 * Sut;
    const SF       = r.tau > 0 ? tauAllow / r.tau : Infinity;

    setRes({
      ...r, Sut, tauAllow, SF, dEq, Nt,
      Ls: Nt * r.t_axial,  // 實體高 = 總圈數 × 軸向邊長
      Ne, mat, matData, L0, Lw, end,
    });
  };

  const row = { display: "flex", flexWrap: "wrap", gap: 20 };

  return (
    <div style={{ display: "flex", gap: 20, flexWrap: "wrap" }}>
      <Card style={{ flex: "0 0 300px" }}>
        <RectSpringSchematic />
        <SectionTitle icon="🟨">矩形截面尺寸</SectionTitle>
        <div style={{ color: C.gold, fontSize: 10, fontFamily: "Courier New", marginBottom: 10 }}>
          ※ 一般將長邊置於徑向方向以減少軸向空間
        </div>
        <div style={row}>
          <Input label="邊長 a"   value={a}  onChange={setA}  step={0.1} unit="mm" />
          <Input label="邊長 b"   value={b}  onChange={setB}  step={0.1} unit="mm" />
        </div>
        <div style={row}>
          <Input label="線圈中徑 Dm"  value={D}  onChange={setDD} step={0.5} unit="mm" />
          <Input label="有效圈 Na" value={Na} onChange={setNa} step={0.5} unit="圈" />
        </div>
        <Select label="端部型式" value={end} onChange={setEnd} options={Object.keys(END_COILS)} />

        <SectionTitle icon="🔧">材料 & 工作條件</SectionTitle>
        <Select label="材料" value={mat} onChange={setMat} options={Object.keys(MAT_G)} />
        <div style={row}>
          <Input label="自由長 L₀" value={L0} onChange={setL0} step={1} unit="mm" />
          <Input label="工作長 Lw" value={Lw} onChange={setLw} step={1} unit="mm" />
        </div>

        {err && <div style={{ color: C.red, fontFamily: "Courier New", fontSize: 11, marginBottom: 10 }}>⚠ {err}</div>}
        <CalcButton onClick={calc}>▶ 計算 k & F</CalcButton>
      </Card>

      {res && (
        <div style={{ flex: 1, minWidth: 340, display: "flex", flexDirection: "column", gap: 16 }}>
          {res.C < 4 && <div style={{ padding: "10px", background: C.amber + "22", border: `1px solid ${C.amber}`, borderRadius: 6, color: C.amber, fontFamily: "Courier New", fontSize: 11 }}>⚠ 彈簧指數 C = {fmt2(res.C)} &lt; 4，應力集中過高</div>}
          {res.ratio > 5 && <div style={{ padding: "10px", background: C.amber + "22", border: `1px solid ${C.amber}`, borderRadius: 6, color: C.amber, fontFamily: "Courier New", fontSize: 11 }}>⚠ 截面比 a/b = {fmt2(res.ratio)} 太扁，建議改用扁鋼帶彈簧</div>}

          {/* KPI row */}
          <Card>
            <div style={{ display: "flex", gap: 32, flexWrap: "wrap" }}>
              <div>
                <Label>彈簧常數 k</Label>
                <div><Value big color={C.green}>{fmt3(res.k)}</Value>
                  <span style={{ color: C.dim, marginLeft: 6 }}>N/mm</span>
                </div>
                <div style={{ color: C.dim, fontSize: 11 }}>{fmt3(res.k / 9.80665)} kgf/mm</div>
              </div>
              <div>
                <Label>壓縮量 δ</Label>
                <div><Value>{fmt2(res.delta)}</Value>
                  <span style={{ color: C.dim, marginLeft: 6 }}>mm</span>
                </div>
              </div>
              <div>
                <Label>彈簧力 F</Label>
                <div><Value big color={C.sky}>{fmt2(res.F)}</Value>
                  <span style={{ color: C.dim, marginLeft: 6 }}>N</span>
                </div>
                <div style={{ color: C.dim, fontSize: 11 }}>{fmt3(res.F / 9.80665)} kgf</div>
              </div>
              <div>
                <Label>安全係數</Label>
                <div style={{ marginTop: 4 }}><Badge sf={res.SF} /></div>
              </div>
            </div>
          </Card>

          {/* Geometry + diagram */}
          <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
            <Card style={{ flex: 1, minWidth: 240 }}>
              <SectionTitle icon="📐">幾何 & 截面參數</SectionTitle>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 20px" }}>
                {[
                  ["軸向 a",      fmt2(res.t_axial), "mm"],
                  ["徑向 b",      fmt2(res.b_radial), "mm"],
                  ["長/短邊比",   fmt3(res.ratio), ""],
                  ["剛度係數 β",  fmt3(res.beta), ""],
                  ["應力係數 α",  fmt3(res.alpha), ""],
                  ["彈簧指數 C",  fmt2(res.C), ""],
                  ["Wahl Kw",     fmt3(res.Kw), ""],
                  ["等效圓徑",    fmt2(res.dEq), "mm"],
                  ["外徑 OD",     fmt2(res.OD), "mm"],
                  ["內徑 ID",     fmt2(res.ID), "mm"],
                  ["總圈 Nt",     res.Nt, "圈"],
                  ["實體高 Ls",   fmt2(res.Ls), "mm"],
                  ["工作應力 τ",  fmt1(res.tau), "MPa"],
                  ["許用應力",    fmt1(res.tauAllow), "MPa"],
                ].map(([l, v, u]) => (
                  <div key={l}>
                    <Label>{l}</Label>
                    <div>
                      <span style={{ color: C.ice, fontFamily: "Courier New", fontSize: 13 }}>{v}</span>
                      {u && <span style={{ color: C.dim, fontSize: 11, marginLeft: 3 }}>{u}</span>}
                    </div>
                  </div>
                ))}
              </div>
            </Card>

            <Card style={{ flex: "0 0 180px" }}>
              <SectionTitle icon="🔍">截面示意</SectionTitle>
              <RectSpringDiagram
                a={res.t_axial} b={res.b_radial} D={D}
                Na={Na} L0={res.L0}
                OD={res.OD} Ls={res.Ls}
              />
            </Card>
          </div>

          {/* Charts */}
          <Card>
            <SectionTitle icon="📈">簧力 vs 壓縮量</SectionTitle>
            <ForceChart k={res.k} delta={res.delta} F={res.F} Ls={res.Ls} L0={res.L0}
              tau={res.tau} Sut={res.Sut} />
          </Card>

          <Card>
            <SectionTitle icon="🌡️">應力分析</SectionTitle>
            <StressChart tau={res.tau} tauAllow={res.tauAllow} Sut={res.Sut} />
          </Card>

          {/* Vendor spec */}
          <Card style={{ borderColor: C.gold + "66" }}>
            <SectionTitle icon="📋">廠商規格摘要</SectionTitle>
            <div style={{ fontFamily: "Courier New", fontSize: 11.5, color: C.text, lineHeight: 2 }}>
              型式：壓縮螺旋彈簧（矩形截面），{res.end}<br />
              材料：{res.mat}（G = {res.matData.G.toLocaleString()} MPa）<br />
              截面：軸向 a = <span style={{ color: C.ice, fontWeight: 700 }}>{fmt2(res.t_axial)} mm</span>
              ／ 徑向 b = <span style={{ color: C.ice, fontWeight: 700 }}>{fmt2(res.b_radial)} mm</span>
              （長/短邊比 {fmt2(res.ratio)}）<br />
              外徑 OD ＝ <span style={{ color: C.ice, fontWeight: 700 }}>{fmt2(res.OD)} mm</span> ／
              內徑 ID ＝ {fmt2(res.ID)} mm ／ 線圈中徑 Dm = {D} mm<br />
              自由長 L₀ ＝ <span style={{ color: C.ice, fontWeight: 700 }}>{res.L0} mm</span>（實體高 Ls = {fmt2(res.Ls)} mm）<br />
              總圈數 Nt ＝ <span style={{ color: C.ice, fontWeight: 700 }}>{res.Nt} 圈</span>（有效圈 Na = {Na}）<br />
              彈簧常數 k ＝ <span style={{ color: C.gold, fontWeight: 700 }}>{fmt3(res.k)} N/mm</span>
              （β = {fmt3(res.beta)}）<br />
              工作行程 δ ＝ {fmt2(res.delta)} mm → 簧力 F ＝ <span style={{ color: C.sky, fontWeight: 700 }}>{fmt2(res.F)} N</span>（{fmt3(res.F / 9.80665)} kgf）
            </div>
          </Card>

          {/* 3D Preview */}
          <Card>
            <SectionTitle icon="🧊">3D 預覽</SectionTitle>
            <ThreeViewer mesh={buildRectPreviewMesh({
              a: res.t_axial, b: res.b_radial, D, Na, end: res.end, L0: res.L0,
            })} />
          </Card>

          {/* CAD download */}
          <Card style={{ borderColor: C.gold + "44", background: C.gold + "08" }}>
            <SectionTitle icon="💾">3D CAD 模型下載</SectionTitle>
            <div style={{ display: "flex", alignItems: "center", gap: 16, flexWrap: "wrap" }}>
              <StepDownloadButton
                onClick={() => {
                  const ts = new Date().toISOString().slice(0,10).replace(/-/g,'');
                  const fname = `RectSpring_${res.t_axial}x${res.b_radial}_OD${fmt2(res.OD)}_L${res.L0}_${ts}.step`;
                  downloadRectSpringStep(
                    { a: res.t_axial, b: res.b_radial, D, Na, end: res.end, L0: res.L0 },
                    fname
                  );
                }}
              />
              <div style={{ color: C.dim, fontSize: 10.5, fontFamily: "Courier New", lineHeight: 1.5 }}>
                STEP AP203 格式 (Faceted BREP)<br />
                矩形截面螺旋掃掠生成，可直接交廠商加工
              </div>
            </div>
          </Card>
        </div>
      )}
    </div>
  );
}
